notes: >-
  The ACTIV Web One API (AtlasFeed) is a WebSocket/WebAssembly API, not REST -
  errors are surfaced as a StatusCode enum rather than HTTP problem types.
  Every rejected Promise (connect, snapshot, subscription, query, time-series)
  carries a StatusCode; the client also ships a StatusCodeError class that
  wraps a StatusCode with a friendly message and toJSON(). This registry is
  the published enum from the @activfinancial/one-api 1.1.4 TypeScript
  definitions (lib/index.d.ts), which backs the reference documentation.
format: enum
envelope: >-
  Rejected Promise value / StatusCodeError.statusCode (numeric enum
  activOneApi.StatusCode)
