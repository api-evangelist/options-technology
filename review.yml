sources:
- url: https://weboneapi.activfinancial.com/tutorials/
  type: Documentation
  note: Documents npm install @activfinancial/one-api and
    activOneApi.connect({ host, user, password }) with tutorial host
    aop-ny4-replay.activfinancial.com; snapshots, subscriptions, queries,
    time series.
- url: https://weboneapi.activfinancial.com/documentation/
  type: APIReference
  note: TypeScript reference for Session, SnapshotHandle, SubscriptionHandle,
    QueryHandle, TimeSeriesHandle, FieldId/Exchange/SymbologyId enumerations;
    wss transport; one-api v1.1.x.
- url: https://www.options-it.com/products/market-data/
  type: Documentation
  note: Raw and normalized streaming market data, multicast/TCP delivery, cloud
    streaming to AWS/GCP/Azure, tickerplant on-demand, data capture with .pcap;
    all routed to sales@options-it.com.
- url: https://www.options-it.com/activ-market-data-overview/
  type: Documentation
  note: ACTIV market data overview under Options IT following the 2021
    acquisition.
- url: https://registry.npmjs.org/@activfinancial/one-api
  type: SDK
  note: Public npm package, dist-tag latest 1.1.4.
