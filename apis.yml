    type: CodeRepository
  description: WebSocket-based (WebAssembly) JavaScript/TypeScript market data API
    for browser and Node.js, installed as npm package '@activfinancial/one-api'
    (latest 1.1.4). Supports snapshots, real-time subscriptions, queries, and
    time-series history across ACTIV's normalized multi-asset feed, with Promises,
    async/await, and AsyncIterator interfaces. Clients connect with
    activOneApi.connect({ host, user, password }) - tutorials document the host
    aop-ny4-replay.activfinancial.com - and credentials are entitlement-managed
    and provisioned by sales, not self-serve. Documentation, tutorials, examples,
    and an in-browser playground are public; no OpenAPI or AsyncAPI spec is
    published.
