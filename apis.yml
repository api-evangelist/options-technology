aid: options-technology
url: https://raw.githubusercontent.com/api-evangelist/options-technology/refs/heads/main/apis.yml
name: Options Technology
kind: company
description: Options Technology (Options IT) is a capital markets managed services
  and trading infrastructure provider founded in 1993, backed by private equity firm
  Abry Partners since 2019, serving over 550 firms globally. Its market data business,
  built on the 2021 acquisition of ACTIV Financial, sells low-latency raw and normalized
  exchange feeds delivered over colocated multicast and TCP, real-time streaming into
  AWS, GCP, and Azure, tickerplant snapshot and time-series services, and lossless
  data capture with raw .pcap files. The commercial relationship is sales-gated and
  entitlement-managed, but the ACTIV Web One API - a WebSocket plus WebAssembly
  JavaScript API distributed via npm - has genuinely public developer documentation,
  tutorials, and an in-browser playground at weboneapi.activfinancial.com.
