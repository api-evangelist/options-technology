notes: >-
  All packages are published under the first-party @activfinancial npm scope
  (ACTIV Financial, acquired by Options Technology in 2021). Licensed
  CC-BY-ND-4.0. one-api (OnePlatform / AtlasFeed Web One API) is the actively
  maintained client (1.1.4, released 2026-03-10); cg-api (ContentGateway) is
  the legacy client - last release 0.16.1 on 2020-02-14, and its former docs
  portal webapi.activfinancial.com no longer resolves (GitHub Pages 404).
  The scope also ships embeddable Web Component viewers, catalogued in
  components/options-technology-components.yml.
